<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爱考仕交规-刷题页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        .header {
            height: 60px;
            background: linear-gradient(90deg, #1abc9c 0%, #667eea 100%);
            display: flex;
            align-items: center;
            padding: 0 20px;
            color: white;
            font-size: 20px;
        }
        .back-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid white;
            color: white;
            padding: 5px 15px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 20px;
            font-size: 16px;
        }
        .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .logout-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        .container {
            display: flex;
            height: calc(100vh - 60px);
            background: white;
        }
        .sidebar {
            width: 200px;
            padding: 20px;
            border-right: 1px solid #eee;
        }
        .box {
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .avatar {
            width: 100%;
            height: 100px;
            border: 1px solid #ddd;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .info p {
            margin: 10px 0;
            font-size: 14px;
        }
        .time-box {
            border: 1px solid #ddd;
            padding: 15px;
            text-align: center;
            margin-top: 20px;
        }
        .time-text {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        .main {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .question-area {
            flex: 1;
        }
        .question-text {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .image-area {
            text-align: center;
            margin: 20px 0;
        }
        .image-area img {
            max-width: 400px;
            max-height: 250px;
        }
        .answer-area {
           height: 120px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .answer-left {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
        }
        .answer-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .option-btn {
            width: 40px;
            height: 40px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            margin: 0 5px;
        }
        .option-btn:disabled {
            cursor: default;
            opacity: 0.7;
        }
        .option-btn.selected {
            background: #1abc9c;
            color: white;
            border-color: #1abc9c;
        }
        .option-btn.correct {
            background: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }
        .option-btn.wrong {
            background: #F44336;
            color: white;
            border-color: #F44336;
        }
        .tip-box {
            padding: 10px 12px;
            background: #fef6f6;
            border: 1px solid #ffcccc;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 14px;
            color: #333;
            display: none;
        }
        .tip-title {
            color: #ff4444;
            font-weight: bold;
            margin-bottom: 4px;
        }
        @keyframes flash {
            0%, 100% { color: #e53935; background: transparent; }
            50% { color: #e53935; background: #ffebee; }
        }
        .flash-keyword {
            animation: flash 0.8s ease-in-out 3;
            color: #e53935;
            font-weight: bold;
        }
        .footer {
            padding: 15px 0;
            border-top: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .accuracy {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
        .footer-btns {
            display: flex;
            gap: 10px;
        }
        .footer-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-read { background: #3498db; }
        .btn-skill { background: #27ae60; }
        .btn-video { background: #d35400; }
        .checkbox-group {
            display: flex;
            flex-direction: column;
            font-size: 12px;
            color: #666;
        }
        .action-btns {
            display: flex;
            gap: 20px;
        }
        .action-btn {
            padding: 10px 30px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }
        .action-btn:hover {
            background: #f5f5f5;
        }
        .card {
            width: 300px;
            padding: 20px;
            border-left: 1px solid #eee;
        }
        .card-table {
            width: 100%;
            border-collapse: collapse;
        }
        .card-table td, .card-table th {
            border: 1px solid #ddd;
            width: 10%;
            height: 30px;
            text-align: center;
            font-size: 12px;
        }
        .card-table th {
            background: #667eea;
            color: white;
        }
        .card-table td.current {
            background: #667eea;
            color: white;
        }
        .random-btn {
            margin-top: 20px;
            padding: 8px 15px;
            background: #5577aa;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            float: right;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .modal-box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
        }
        .modal-title {
            color: red;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .modal-btns {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .modal-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-cancel { background: #eee; color: #333; }
        .btn-confirm { background: #3498db; color: white; }
        .multi-confirm {
            padding: 8px 20px;
            background: #ff5722;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            display: none;
            margin-left: 10px;
        }
        .end-confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .end-confirm-box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            width: 300px;
        }
        .end-confirm-title {
            color: red;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .end-confirm-tip {
            line-height: 1.8;
            font-size: 16px;
            margin-bottom: 30px;
        }
        .end-confirm-btns {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .end-btn-cancel {
            padding: 8px 20px;
            background: #eee;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .end-btn-confirm {
            padding: 8px 20px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .result-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1001;
        }
        .result-box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            width: 300px;
        }
        .result-title {
            color: red;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .result-score {
            font-size: 18px;
            color: blue;
            margin-bottom: 15px;
        }
        .result-tip {
            font-size: 18px;
            color: red;
            font-weight: bold;
            margin-bottom: 30px;
        }
        .result-btns {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .result-btn-wrong {
            padding: 8px 20px;
            background: #eee;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .result-btn-back {
            padding: 8px 20px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="history.back()">&lt; 返回</button>
        <span>爱考仕祝您早日拿证,加盟电话18583769998</span>
        <div class="header-right">
            <span id="showUser"></span>
            <button class="logout-btn" onclick="logout()">⏻</button>
        </div>
    </div>

    <div class="container">
        <div class="sidebar">
            <div class="box">
                <p style="color: #66aaff;">爱考仕交规刷题</p>
                <p id="examNo">第001考台</p>
            </div>
            <div class="avatar">
                <img src="https://img.icons8.com/fluency/96/000000/user-male-circle.png" width="60">
            </div>
            <div class="info">
                <p style="color: #66aaff;">考生信息</p>
                <p>考生姓名: <span id="userName">--</span></p>
                <p>考试车型: <span id="carText">小车</span></p>
                <p>科&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;目: <span id="subjText">科目一</span></p>
                <p>试卷名称: <span id="paperText">--</span></p>
            </div>
            <div class="time-box">
                <p style="color: #66aaff;">剩余时间</p>
                <div class="time-text" id="countdown">45:00</div>
            </div>
        </div>

        <div class="main">
            <div class="question-area">
                <div class="questionText" id="questionText"></div>
                <div class="image-area" id="imageArea"></div>
            </div>
            <div class="answer-area">
                <div class="answer-left">
                    <span>您选择的答案:</span>
                    <span id="userAnswer">未选择</span>
                </div>
                <div class="answer-right">
                    <div id="optionBtns"></div>
                    <button class="multi-confirm" id="multiConfirmBtn" onclick="confirmMultiAnswer()">确认答案</button>
                </div>
            </div>
            <div class="tip-box" id="tipBox">
                <div class="tip-title">答题技巧</div>

            <div class="footer">
                <div class="accuracy">正确率: <span id="accuracy">0.00%</span></div>
                <div class="footer-btns">
                    <button class="footer-btn btn-read" onclick="readQuestion()">读题</button>
                    <button class="footer-btn btn-skill" onclick="showTip()">答题技巧</button>
                    <button class="footer-btn btn-video">视频教程</button>

                <div class="checkbox-group">
                    <label><input type="checkbox" id="memorizeMode"> 背题模式</label>

                    <button class="action-btn" onclick="prevQuestion()">上一题</button>

        <div class="card">
            <table class="card-table" id="cardTable"></table>
            <button class="random-btn" onclick="shuffleQuestions()">随机模式</button>

    </div>

    <div class="modal" id="startModal">
        <div class="modal-box">
            <div class="modal-title">考试开始</div>
            <p>倒计时准备，请点击确认开始</p>
            <div class="modal-btns">
                <button class="modal-btn btn-cancel" onclick="location.href='index.html'">取消</button>
                <button class="modal-btn btn-confirm" onclick="startExam()">确定</button>
            </div>
        </div>
    </div>

    <div class="end-confirm-modal" id="endConfirmModal">
        <div class="end-confirm-box">
            <div class="end-confirm-title">考试确认窗口</div>
            <div class="end-confirm-tip">
                操作提示:<br>
                1：点击【结束功能】，<br>将提交考试成绩，结束考试！<br>
                2：点击【继续考试】，<br>将关闭本窗口，继续考试！
            </div>
            <div class="end-confirm-btns">
                <button class="end-btn-cancel" onclick="closeEndConfirm()">继续考试</button>
                <button class="end-btn-confirm" onclick="confirmEndExam()">确认交卷</button>
            </div>
        </div>
    </div>

    <div class="result-modal" id="resultModal">
        <div class="result-box">
            <div class="result-title">考试结果查看</div>
            <div class="result-score">本场考试得分: <span id="finalScore">0</span></div>
            <div class="result-tip" id="resultTipText">恭喜解锁“再来一次”！</div>
            <div class="result-btns">
                <button class="result-btn-wrong" onclick="viewWrongQuestions()">错题查看</button>
                <button class="result-btn-back" onclick="backToIndex()">返回题库</button>
            </div>
        </div>
    </div>

<script>
// 读取URL参数
const urlSearch = new URLSearchParams(location.search);
const PARAMS = {
    car: urlSearch.get('car') || "小车",
    subj: urlSearch.get('subj') || "科目一",
    mode: urlSearch.get('mode') || "精选试卷",
    lic: urlSearch.get('lic') || "",
    droneTp: urlSearch.get('droneTp') || "",
    title: urlSearch.get('title') || ""
};

let globalMemorizeMode = false;
let globalShowAnswer = false;
let questions = [];
let answerRecord = {};
let current = 0;
let timer;
let finalScore = 0;
let currPaperName = PARAMS.title;

// ========== 核心：拼接本地题库JSON路径 ==========
function getBankFilePath() {
    const { car, subj, mode, lic, droneTp, title } = PARAMS;
    let fileName = "";

    // 1. 无人机分类
    if (car === "无人机") {
        fileName = `${car}_${lic}_${droneTp}_${mode}_${title}.json`;
    }
    // 2. 三力测试
    else if (car === "三力测试") {
        fileName = `${car}_all_${mode}_${title}.json`;
    }
    // 3. 常规：小车/客车/货车/摩托车
    else {
        fileName = `${car}_${subj}_${mode}_${title}.json`;
    }
    // 拼接目录路径
    return `question_bank/${encodeURIComponent(fileName)}`;
}

// 加载本地题库JSON（替代后端接口）
async function loadPaperData(){
    if(!currPaperName){
        alert("未获取试卷名称");
        location.href="index.html";
        return;
    }
    const jsonPath = getBankFilePath();
    try {
        const res = await fetch(jsonPath);
        if (!res.ok) throw new Error("文件不存在");
        const rawList = await res.json();
        initQuestions(rawList);
    } catch (err) {
        console.error("加载题库失败：", err);
        alert(`题库文件加载失败\n路径：${getBankFilePath()}\n请检查 question_bank 下对应JSON文件是否存在`);
        location.href="index.html";
    }
}

// 页面信息赋值
const loginName = localStorage.getItem('userName') || "游客";
document.getElementById('userName').innerText = loginName;
document.getElementById('showUser').innerText = loginName;
document.getElementById('carText').innerText = PARAMS.car;
document.getElementById('subjText').innerText = PARAMS.car==="三力测试"?"无":(PARAMS.car==="无人机"?"无":PARAMS.subj);
document.getElementById('paperText').innerText = currPaperName;

// 工具函数
function clearBracket(str){
    return str.replace(/【|】/g,"");
}
function addKeywordFlash(str){
    return str.replace(/【([^】]+)】/g,'<span class="flash-keyword">$1</span>');
}

// 格式化题目（原有解析逻辑不动）
function initQuestions(rawArr) {
    questions = rawArr.map((item, index) => {
        const f = item.fields;
        const typeMap = { 1: 'judge', 2: 'choice', 3: 'multiple' };
        const type = typeMap[item.type];
        const options = [f.c_a, f.c_b, f.c_c, f.c_d].filter(i => i);
        let answer = null;
        if (type === 'judge') answer = f.answer === '对' ? 0 : 1;
        else if (type === 'choice') answer = f.answer.charCodeAt(0) - 65;
        else if (type === 'multiple') answer = f.answer.split(';').map(c => c.charCodeAt(0) - 65);
        return {
            idx: index + 1,
            type,
            question: f.content,
            options,
            answer,
            image: item.img,
            tip: f.skill_txt || f.solution,
            raw: item
        };
    });
    renderCardTable();
}

// 答题卡
function renderCardTable() {
    const table = document.getElementById('cardTable');
    table.innerHTML = '';
    const total = questions.length;
    const colNum = 10;
    let headTr = document.createElement('tr');
    let headTh = document.createElement('th');
    headTh.innerText = '题';
    headTr.appendChild(headTh);
    for (let c = 1; c <= colNum; c++) {
        let th = document.createElement('th');
        th.innerText = c;
        headTr.appendChild(th);
    }
    table.appendChild(headTr);
    let rowIndex = 1;
    for (let i = 0; i < total; i += colNum) {
        let tr = document.createElement('tr');
        let rowTh = document.createElement('th');
        rowTh.innerText = rowIndex;
        tr.appendChild(rowTh);
        for (let j = 0; j < colNum; j++) {
            const qNum = i + j + 1;
            let td = document.createElement('td');
            td.id = `card-${qNum}`;
            td.innerText = qNum;
            td.onclick = function () {
                let idx = questions.findIndex(q => q.idx === qNum);
                if (idx > -1) {
                    current = idx;
                    loadQuestion();
                }
            };
            tr.appendChild(td);
            if (qNum >= total) break;
        }
        table.appendChild(tr);
        rowIndex++;
    }
}
function resetCardTable() {
    const tds = document.querySelectorAll('.card-table td[id^="card-"]');
    tds.forEach(td => {
        const num = td.id.replace('card-', '');
        td.innerText = num;
        td.style.color = "";
        td.classList.remove('current');
    });
}
// 随机打乱
function shuffleQuestions() {
    let shuffled = [...questions];
    for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    questions = shuffled.map((item, index)=>{
        item.idx = index+1;
        return item;
    })
    answerRecord = {};
    current = 0;
    resetCardTable();
    renderCardTable();
    updateAccuracy();
    loadQuestion();
    syncCollectStatus();
    alert("题目已随机打乱！");
}

// 收藏
function getFavList(){
    return JSON.parse(localStorage.getItem('favoritesList')||'[]');
}
function isCurrentQuestionFavorited(){
    const list = getFavList();
    const q = questions[current];
    const qId = q.raw.id;
    return list.some(item => item.raw.id === qId);
}
function toggleCollect(){
    let arr = getFavList();
    let q = questions[current];
    const qId = q.raw.id;
    let idx = arr.findIndex(item => item.raw.id === qId);
    if(idx > -1){
        arr.splice(idx, 1);
    }else{
        arr.push({...q});
    }
    localStorage.setItem('favoritesList', JSON.stringify(arr));
    syncCollectStatus();
}
function syncCollectStatus(){
    let el=document.querySelector('.footer-btns span');
    el.innerText=isCurrentQuestionFavorited()?"★ 已收藏":"☆ 收藏本题";
    el.style.color=isCurrentQuestionFavorited()?"#f39c12":"#666";
}

// 渲染题目
function loadQuestion() {
    const q = questions[current];
    const record = answerRecord[q.idx];
    const typeLabel = { judge: '判断题', choice: '单选题', multiple: '多选题' }[q.type];
    let qText, optArr = [];

    if(globalMemorizeMode){
        qText = `${q.idx}.(${typeLabel}) ${addKeywordFlash(q.question)}<br><br>`;
        q.options.forEach(opt=>optArr.push(addKeywordFlash(opt)));
        document.getElementById('tipContent').innerHTML = q.tip;
        document.getElementById('tipBox').style.display = "block";
    } else {
        if(record && record.isRight === false){
            qText = `${q.idx}.(${typeLabel}) ${addKeywordFlash(q.question)}<br><br>`;
            q.options.forEach(opt=>optArr.push(addKeywordFlash(opt)));
        } else {
            qText = `${q.idx}.(${typeLabel}) ${clearBracket(q.question)}<br><br>`;
            q.options.forEach(opt=>optArr.push(clearBracket(opt)));
        }
        document.getElementById('tipBox').style.display = "none";
    }

    q.options.forEach((_,i)=>{
        let lab = ['A','B','C','D'][i];
        qText += `${lab}: ${optArr[i]}<br>`;
    });

    document.getElementById('questionText').innerHTML = qText;
    document.getElementById('imageArea').style.display = q.image?"block":"none";
    if(q.image)document.getElementById('imageArea').innerHTML=`<img src="${q.image}">`;

    let btnHtml = q.type==='judge'
        ?`<button class="option-btn" onclick="select(0)">✓</button><button class="option-btn" onclick="select(1)">×</button>`
        :`<button class="option-btn" onclick="select(0)">A</button><button class="option-btn" onclick="select(1)">B</button><button class="option-btn" onclick="select(2)">C</button><button class="option-btn" onclick="select(3)">D</button>`;
    document.getElementById('optionBtns').innerHTML=btnHtml;

    const btns = document.querySelectorAll('.option-btn');
    const isAnswered = record && record.isRight !== undefined;

    const userAnswerEl = document.getElementById('userAnswer');
    if (!record || !record.selectedText) {
        userAnswerEl.innerText = "未选择";
        userAnswerEl.style.color = "#999";
    } else {
        userAnswerEl.innerText = record.selectedText;
        if (record.isRight === undefined) {
            userAnswerEl.style.color = "";
        } else {
            userAnswerEl.style.color = record.isRight ? "#4CAF50" : "#F44336";
        }
    }

    if(globalMemorizeMode || globalShowAnswer){
        if(!isAnswered){
            btns.forEach(b => b.disabled = false);
            document.getElementById('multiConfirmBtn').style.display = q.type === 'multiple' ? 'inline-block' : 'none';
        } else {
            btns.forEach(b=>b.disabled=true);
            document.getElementById('multiConfirmBtn').style.display = 'none';
        }
        if(Array.isArray(q.answer)){
            q.answer.forEach(i=>btns[i].classList.add('correct'));
        }else{
            btns[q.answer].classList.add('correct');
        }
    }else{
        if(!isAnswered){
            btns.forEach(b=>b.disabled=false);
            document.getElementById('multiConfirmBtn').style.display = q.type === 'multiple' ? 'inline-block' : 'none';
            if(record && Array.isArray(record.selected)){
                record.selected.forEach(idx => btns[idx].classList.add('selected'));
                userAnswerEl.innerText = record.selectedText || "未选择";
                userAnswerEl.style.color = "";
            }
        }
    }

    if(isAnswered){
        if(q.type==='multiple'){
            record.selected.forEach(i=>btns[i].classList.add('selected'));
            if(record.isRight) {
                record.selected.forEach(i=>btns[i].classList.add('correct'));
            } else {
                record.selected.forEach(i=>{if(!q.answer.includes(i))btns[i].classList.add('wrong');});
                q.answer.forEach(i=>btns[i].classList.add('correct'));
            }
        }else{
            btns[record.selected].classList.add('selected');
            if(record.isRight){
                btns[record.selected].classList.add('correct');
            }else{
                btns[record.selected].classList.add('wrong');
                if(!Array.isArray(q.answer)) btns[q.answer].classList.add('correct');
            }
        }
        btns.forEach(b=>b.disabled=true);
        document.getElementById('multiConfirmBtn').style.display='none';
        if(!globalMemorizeMode && !record.isRight){
            document.getElementById('tipContent').innerHTML=q.tip;
            document.getElementById('tipBox').style.display='block';
        }
    }

    document.querySelectorAll('.card-table td').forEach(t=>t.classList.remove('current'));
    document.getElementById(`card-${q.idx}`)?.classList.add('current');
    updateCardTable();
    syncCollectStatus();
}

// 选题
function select(idx){
    const q=questions[current];
    if(answerRecord[q.idx]?.isRight!==undefined) return;
    if(globalMemorizeMode || globalShowAnswer) return;
    
    let btns=document.querySelectorAll('.option-btn');
    if(q.type==='judge'||q.type==='choice'){
        let right=Array.isArray(q.answer)?q.answer.includes(idx):(idx===q.answer);
        const label = q.type === 'judge' ? ['✓','×'][idx] : ['A','B','C','D'][idx];
        answerRecord[q.idx]={selected:idx,selectedText:label,isRight:right};
        btns[idx].classList.add('selected');
        document.getElementById('userAnswer').innerText = label;
        document.getElementById('userAnswer').style.color = "";
        btns.forEach(b=>b.disabled=true);
        right?btns[idx].classList.add('correct'):
        (btns[idx].classList.add('wrong'),!Array.isArray(q.answer)&&btns[q.answer].classList.add('correct'));
        updateCardTable();updateAccuracy();
        if(!right) loadQuestion();
        let autoNext=document.getElementById('autoNext').checked;
        if(autoNext&&right)setTimeout(nextQuestion,600);
    }
    if(q.type==='multiple'){
        let sel=answerRecord[q.idx]?.selected||[];
        let pos=sel.indexOf(idx);
        pos>-1?(sel.splice(pos,1),btns[idx].classList.remove('selected')):(sel.push(idx),btns[idx].classList.add('selected'));
        const txt=sel.map(x=>["A","B","C","D"][x]).join(';')||"未选择";
        document.getElementById('userAnswer').innerText=txt;
        document.getElementById('userAnswer').style.color = "";
        answerRecord[q.idx]={selected:sel,selectedText:txt,isRight:undefined};
    }
}
// 多选确认
function confirmMultiAnswer(){
    const q=questions[current];
    if(q.type!=='multiple')return;
    let rec=answerRecord[q.idx];
    if(!rec||!rec.selected.length)return alert("请先选择答案");
    let ok=JSON.stringify(q.answer.sort())===JSON.stringify(rec.selected.sort());
    rec.isRight=ok;
    let btns=document.querySelectorAll('.option-btn');
    ok?rec.selected.forEach(i=>btns[i].classList.add('correct')):(
        rec.selected.forEach(i=>{if(!q.answer.includes(i))btns[i].classList.add('wrong');}),
        q.answer.forEach(i=>btns[i].classList.add('correct')),
        loadQuestion()
    );
    btns.forEach(b=>b.disabled=true);
    document.getElementById('multiConfirmBtn').style.display='none';
    updateCardTable();updateAccuracy();
    let autoNext=document.getElementById('autoNext').checked;
    if(autoNext&&ok)setTimeout(nextQuestion,600);
}
function updateCardTable(){
    questions.forEach(q=>{
        let r=answerRecord[q.idx];
        let td=document.getElementById(`card-${q.idx}`);
        if(!td||!r)return;
        let str="";
        if(q.type==='judge')str=["✓","×"][r.selected];
        else if(q.type==='choice')str=["A","B","C","D"][r.selected];
        else str=r.selected.map(i=>["A","B","C","D"][i]).join('');
        td.innerText=str;
        td.style.color=r.isRight?"green":"red";
    });
}
function updateAccuracy(){
    let r=0,t=Object.keys(answerRecord).length;
    for(let k in answerRecord)if(answerRecord[k].isRight)r++;
    document.getElementById('accuracy').innerText=t?(r/t*100).toFixed(2)+"%":"0.00%";
}
function prevQuestion(){if(current>0){current--;loadQuestion();}}
function nextQuestion(){
    let q=questions[current];
    let r=answerRecord[q.idx];
    if(q.type==='multiple'&&r&&r.isRight===undefined&&!confirm("多选题未确认，确定跳过？"))return;
    if(current<questions.length-1){current++;loadQuestion();}else alert("已到最后一题");
}

// 交卷弹窗
function showEndConfirm() {
    document.getElementById('endConfirmModal').style.display = 'flex';
}
function closeEndConfirm() {
    document.getElementById('endConfirmModal').style.display = 'none';
}
function getScoreComment(score) {
    if (score === 100) return "🎉 满分通关！你就是驾考大神！";
    else if (score >= 90) return "✅ 恭喜及格！稳稳拿下科目！";
    else if (score >= 80) return "💪 差一点就过了！再刷几套就稳了！";
    else if (score >= 70) return "📚 还需加把劲，易错点再巩固一下！";
    else if (score >= 60) return "⚠️ 及格线边缘徘徊，别灰心继续练！";
    else return "🔄 恭喜解锁「再来一次」！错题多刷几遍就过了！";
}
function confirmEndExam() {
    closeEndConfirm();
    clearInterval(timer);
    updateCardTable();
    let right = 0;
    const answered = Object.keys(answerRecord).length;
    let wrongQuestions = [];
    for (const k in answerRecord) {
        const q = questions.find(x => x.idx === parseInt(k));
        if (answerRecord[k].isRight) right++;
        else if(q) wrongQuestions.push(q.raw);
    }
    finalScore = Math.round((right / questions.length) * 100);
    saveErrorRecords(wrongQuestions, right, answered, PARAMS.car, PARAMS.subj);
    document.getElementById('finalScore').innerText = finalScore;
    document.getElementById('resultTipText').innerText = getScoreComment(finalScore);
    document.getElementById('resultModal').style.display = 'flex';
}
function viewWrongQuestions() {
    location.href = "index.html";
}
function backToIndex() {
    location.href = "index.html";
}
// 保存错题本地
function saveErrorRecords(wrongQuestions, rightCount, answeredCount, carType, subject) {
    const errorRecords = JSON.parse(localStorage.getItem('errorRecords') || '[]');
    errorRecords.unshift({
        id: Date.now(),
        time: new Date().toLocaleString(),
        carType: carType,
        subject: subject,
        paper: currPaperName,
        total: questions.length,
        right: rightCount,
        wrong: wrongQuestions.length,
        questions: wrongQuestions
    });
    localStorage.setItem('errorRecords', JSON.stringify(errorRecords));
}

// 倒计时
function startCountdown(){
    let s=45*60;
    timer=setInterval(()=>{
        s--;
        let m=Math.floor(s/60),ss=s%60;
        document.getElementById('countdown').innerText=`${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
        if(s<=0){clearInterval(timer);alert("考试时间结束");confirmEndExam();}
    },1000);
}
function startExam(){
    document.getElementById('startModal').style.display='none';
    startCountdown();loadQuestion();
}
function logout(){
    if(confirm("确定退出？")){
        clearInterval(timer);
        location.href="login.html";
    }
}
// 语音读题
function readQuestion(){
    let text=clearBracket(questions[current].question);
    if('speechSynthesis' in window){
        speechSynthesis.cancel();
        let u=new SpeechSynthesisUtterance(text);
        u.lang="zh-CN";
        speechSynthesis.speak(u);
    }
}
function showTip(){
    let box=document.getElementById('tipBox');
    box.style.display=box.style.display==='block'?'none':'block';
    document.getElementById('tipContent').innerHTML=questions[current].tip;
}
// 背题开关
function toggleMemorizeMode(){
    globalMemorizeMode = document.getElementById('memorizeMode').checked;
    loadQuestion();
}
function toggleShowAnswerMode(){
    globalShowAnswer = document.getElementById('showAnswerMode').checked;
    loadQuestion();
}

// 页面初始化
window.onload=async function(){
    document.querySelector('.footer-btns span').onclick=toggleCollect;
    document.querySelector('.btn-read').onclick=readQuestion;
    document.querySelector('.btn-skill').onclick=showTip;
    document.getElementById('memorizeMode').onchange = toggleMemorizeMode;
    document.getElementById('showAnswerMode').onchange = toggleShowAnswerMode;
    // 加载本地题库JSON
    await loadPaperData();
    syncCollectStatus();
}
</script>
