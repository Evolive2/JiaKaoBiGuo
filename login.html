<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>爱考仕答题系统 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            /* 还原截图的蓝绿色渐变背景 */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #00d4aa 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 20px;
        }

        /* 左侧插画区域（你可以用占位，后续教你替换） */
        .login-illustration {
            width: 45%;
            min-width: 300px;
            max-width: 600px;
            /* 这里先放一个背景色占位，你可以后续替换成截图里的插画 */
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        /* 右侧登录卡片 */
        .login-card {
            width: 400px;
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .login-title {
            text-align: center;
            color: #00bfa5; /* 还原标题的青绿色 */
            font-size: 24px;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .form-item {
            margin-bottom: 20px;
        }

        .form-item input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1px solid #eee;
            border-radius: 4px;
            font-size: 16px;
            background-repeat: no-repeat;
            background-position: 12px center;
            background-size: 20px;
        }

        /* 用户名输入框图标 */
        #username {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23999"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>');
        }

        /* 密码输入框图标 */
        #password {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23999"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>');
        }

        .form-item input:focus {
            outline: none;
            border-color: #00bfa5;
        }

        .remember-box {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            font-size: 14px;
            color: #666;
        }

        .remember-box input {
            margin-right: 8px;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #00d4aa, #667eea);
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        .login-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <!-- 左侧插画占位 -->
    <div class="login-illustration">
        <!-- 插画区域（后续可替换为截图中的图案） -->
        <img src="imgs/登录页-左侧考场图.png" alt="登录插画" width="720" height="540">
    </div>

    <!-- 右侧登录卡片 -->
    <div class="login-card">
        <div class="login-title">爱考仕答题系统</div>
        
        <div class="form-item">
            <input type="text" id="username" placeholder="请输入账号" value="SGYC202613">
        </div>
        
        <div class="form-item">
            <input type="password" id="password" placeholder="请输入密码">
        </div>

        <div class="remember-box">
            <input type="checkbox" id="remember">
            <label for="remember">记住密码</label>
        </div>

        <button class="login-btn" onclick="login()">登录</button>
    </div>

    <script>
    //页面加载：读取记住密码缓存，自动回填账号密码
    window.onload = function(){
        // 页面加载回填记住的账号密码
        let saveUser = localStorage.getItem("saveUserName");
        let savePwd = localStorage.getItem("savePwd");
        let rememberCheck = document.getElementById("remember");
        if(saveUser && savePwd){
            document.getElementById("username").value = saveUser;
            document.getElementById("password").value = savePwd;
            rememberCheck.checked = true;
        }
    }

    // 登录函数：调用Cloudflare Worker后端接口校验
    async function login() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const isRemember = document.getElementById('remember').checked;

        if(!username || !password){
            alert("账号或密码不能为空！");
            return;
        }

        // ==========替换成你自己的Worker域名！！==========
        const apiUrl = "https://jiakaobiguo-login-api.yanwu0425.workers.dev/api/login";

        try {
            // 请求后端登录接口
            let res = await fetch(apiUrl, {
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({username,password})
            })
            let result = await res.json();

            // 后端返回200=登录成功
            if(result.code === 200){
                // 存储登录token（index首页靠token鉴权）
                localStorage.setItem("userLoginToken", result.data.token);
                // 顺带存储用户账号、VIP状态
                localStorage.setItem("userName", result.data.username);

                // 记住密码逻辑
                if(isRemember){
                    localStorage.setItem("saveUserName",username);
                    localStorage.setItem("savePwd",password);
                }else{
                    localStorage.removeItem("saveUserName");
                    localStorage.removeItem("savePwd");
                }
                location.href = "index.html";
            }else{
                // 账号错误、服务器异常提示
                alert(result.msg);
            }
        }catch(e){
            alert("接口请求失败，网络异常");
        }
    }
    </script>
</body>
</html>
