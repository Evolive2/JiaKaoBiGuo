<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>爱考仕答题系统 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #00d4aa 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 20px;
        }
        .login-illustration {
            width: 45%;
            min-width: 300px;
            max-width: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-illustration img {
            max-width:100%;
            border-radius:20px;
        }
        .login-card {
            width: 400px;
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .login-title {
            text-align: center;
            color: #00bfa5;
            font-size: 24px;
            margin-bottom: 30px;
            font-weight: bold;
        }
        .form-item {
            margin-bottom: 20px;
        }
        .form-item input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1px solid #eee;
            border-radius: 4px;
            font-size: 16px;
            background-repeat: no-repeat;
            background-position: 12px center;
            background-size: 20px;
        }
        #username {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23999"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>');
        }
        #password {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23999"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>');
        }
        .form-item input:focus {
            outline: none;
            border-color: #00bfa5;
        }
        .remember-box {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            font-size: 14px;
            color: #666;
        }
        .remember-box input {
            margin-right: 8px;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #00d4aa, #667eea);
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }
        .login-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="login-illustration">
        <img src="imgs/登录页-左侧考场图.png" alt="登录插画">
    </div>
    <div class="login-card">
        <div class="login-title">爱考仕答题系统</div>
        <div class="form-item">
            <input type="text" id="username" placeholder="请输入账号">
        </div>
        <div class="form-item">
            <input type="password" id="password" placeholder="请输入密码">
        </div>
        <div class="remember-box">
            <input type="checkbox" id="remember">
            <label for="remember">记住密码</label>
        </div>
        <button class="login-btn" onclick="login()">登录</button>
    </div>

    <script>
        // 填入本地保存账号密码
        (function(){
            let user = localStorage.getItem("userInfo");
            if(user){
                let info = JSON.parse(user);
                document.getElementById('username').value = info.name;
                document.getElementById('password').value = info.pwd;
                document.getElementById('remember').checked = true;
            }
        })()

        // ========== 这里后续替换成你CF Worker接口地址 ==========
        const API_LOGIN = "jiakaobiguo.yanwu0425.workers.dev";

        async function login() {
            let name = document.getElementById('username').value.trim();
            let pwd = document.getElementById('password').value.trim();
            let rem = document.getElementById('remember').checked;
            if(!name || !pwd){
                alert("账号密码不能为空");
                return;
            }
            try {
                // 请求云端接口校验账号密码
                let res = await fetch(API_LOGIN,{
                    method:"POST",
                    headers:{"Content-Type":"application/json"},
                    body:JSON.stringify({username:name,password:pwd})
                })
                let data = await res.json();
                if(data.code === 200){
                    // 登录成功，存储登录令牌
                    localStorage.setItem("token",data.token);
                    localStorage.setItem("loginUser",JSON.stringify(data.user));
                    // 记住密码
                    if(rem){
                        localStorage.setItem("userInfo",JSON.stringify({name,pwd}))
                    }else{
                        localStorage.removeItem("userInfo")
                    }
                    alert("登录成功");
                    location.href = "index.html";
                }else{
                    alert(data.msg || "账号或密码错误");
                }
            }catch(e){
                // 接口未部署时本地临时调试（正式上线删掉这段else）
                alert('接口暂未部署，临时调试放行');
                localStorage.setItem("token","test_token_"+Date.now());
                location.href="index.html";
            }
        }
    </script>
</body>
</html>
