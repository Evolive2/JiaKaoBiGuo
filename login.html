<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>爱考仕答题系统 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            /* 还原截图的蓝绿色渐变背景 */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #00d4aa 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 20px;
        }

        /* 左侧插画区域（你可以用占位，后续教你替换） */
        .login-illustration {
            width: 45%;
            min-width: 300px;
            max-width: 600px;
            /* 这里先放一个背景色占位，你可以后续替换成截图里的插画 */
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        /* 右侧登录卡片 */
        .login-card {
            width: 400px;
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .login-title {
            text-align: center;
            color: #00bfa5; /* 还原标题的青绿色 */
            font-size: 24px;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .form-item {
            margin-bottom: 20px;
        }

        .form-item input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1px solid #eee;
            border-radius: 4px;
            font-size: 16px;
            background-repeat: no-repeat;
            background-position: 12px center;
            background-size: 20px;
        }

        /* 用户名输入框图标 */
        #username {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23999"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>');
        }

        /* 密码输入框图标 */
        #password {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23999"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>');
        }

        .form-item input:focus {
            outline: none;
            border-color: #00bfa5;
        }

        .remember-box {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            font-size: 14px;
            color: #666;
        }

        .remember-box input {
            margin-right: 8px;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #00d4aa, #667eea);
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        .login-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <!-- 左侧插画占位 -->
    <div class="login-illustration">
        插画区域（后续可替换为截图中的图案）
    </div>

    <!-- 右侧登录卡片 -->
    <div class="login-card">
        <div class="login-title">爱考仕答题系统</div>
        
        <div class="form-item">
            <input type="text" id="username" placeholder="请输入账号" value="SGYC202613">
        </div>
        
        <div class="form-item">
            <input type="password" id="password" placeholder="请输入密码">
        </div>

        <div class="remember-box">
            <input type="checkbox" id="remember">
            <label for="remember">记住密码</label>
        </div>

        <button class="login-btn" onclick="login()">登录</button>
    </div>

    <script>
        // 简单的登录逻辑（模拟）
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // 这里写你的账号密码校验逻辑，比如：
            if (username && password) {
                // 登录成功，跳转到首页（我们接下来写）
                alert('登录成功！跳转到首页');
                // 实际项目中这里用 location.href = 'index.html';
            } else {
                alert('请输入账号和密码');
            }
        }
    </script>
</body>
</html>
