        function renderQuestion(){
            let box = document.getElementById("questionBox");
            let list = [];
            if(currCar === "无人机"){
                droneSelectDom.classList.add('show');
                tabWrap.classList.add('hide-area');
                modeWrap.classList.remove('hide-area');
                list = questionData.无人机[currLicense][currDroneType][currMode]||[];
            }else if(currCar === "三力测试"){
                droneSelectDom.classList.remove('show');
                tabWrap.classList.add('hide-area');
                modeWrap.classList.add('hide-area');
                list = questionData["三力测试"]["all"]["精选试卷"];
            }else{
                droneSelectDom.classList.remove('show');
                tabWrap.classList.remove('hide-area');
                modeWrap.classList.remove('hide-area');
                list = questionData[currCar][currSubject][currMode]||[];
            }
            let wrapClass = currMode === "精选试卷" ? "grid-container" : "grid-single";
            let html = `<div class="${wrapClass}">`;
            list.forEach(col=>{
                html += `<div class="btn-group">`;
                col.list.forEach(title=>{
                    let link = `exam_car_${title}.html`;
                    html += `<button class="exam-btn ${col.color}" onclick="location.href='${link}'">${title}</button>`;
                });
                html += `</div>`;
            })
            html += `</div>`;
            box.innerHTML = html;
        }

        function selectCar(el,type){
            currCar = type;
            document.querySelectorAll('.sidebar-item').forEach(x=>x.classList.remove('active'));
            el.classList.add('active');
            if(type === "无人机"){
                currLicense = licenseSel.value;
                currDroneType = droneTypeSel.value;
                currMode = "精选试卷";
                document.querySelectorAll('.func-btn').forEach(x=>x.classList.remove('active'));
                document.querySelector('.func-btn').classList.add('active');
            }else if(type === "三力测试"){
                currMode = "精选试卷";
            }else{
                currSubject = "科目一";
                currMode = "精选试卷";
                document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
                document.querySelector('.tab-btn').classList.add('active');
                document.querySelectorAll('.func-btn').forEach(x=>x.classList.remove('active'));
                document.querySelector('.func-btn').classList.add('active');
            }
            renderQuestion();
        }
        function selectTab(el,type){
            currSubject = type;
            document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
            el.classList.add('active');
            renderQuestion();
        }
        function selectMode(el,type){
            currMode = type;
            document.querySelectorAll('.func-btn').forEach(x=>x.classList.remove('active'));
            el.classList.add('active');
            renderQuestion();
        }

        // 核心改造：模拟考试自动按当前车型/科目/无人机参数存储
        function goSimulationExam() {
            let simConfig = {};
            if(currCar === "无人机"){
                // 无人机：执照+机型，无科目
                simConfig = {
                    carType: currCar,
                    license: currLicense,
                    droneType: currDroneType,
                    subject: ""
                }
            }else{
                // 普通车型：车型+科目（三力测试科目为空）
                simConfig = {
                    carType: currCar,
                    subject: currSubject,
                    license: "",
                    droneType: ""
                }
            }
            localStorage.setItem("simulationConfig", JSON.stringify(simConfig));
            location.href = "simulation_guide.html";
        }

        renderQuestion();
